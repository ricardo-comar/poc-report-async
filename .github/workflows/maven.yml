# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Install Azure Functions Core Tools
      run: |
        npm install -g azure-functions-core-tools@4 --unsafe-perm true
        func --version
        node --version
        
    - name: Install Azurite
      uses: potatoqualitee/azuright@v1.1

    - name: Start Azure Functions
      working-directory: ./target/azure-functions/report_async-20260228093553753
      run: |
        cp ../../../function-app/*.json ./
        func start --port 7071 &
        echo "Waiting for Functions to be ready..."
        timeout 60s bash -c 'until curl -s http://localhost:7071/admin/host/status; do sleep 2; done'

    - name: Run Performance Tests
      run: mvn verify 
      
    - name: Upload Gatling Results
      uses: actions/upload-artifact@v4
      with:
        name: gatling-reports
        path: target/gatling/
    
    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
